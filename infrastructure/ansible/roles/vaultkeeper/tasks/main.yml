---
- name: Create VaultKeeper directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - "{{ vk_deploy_dir }}"
    - "{{ vk_backup_dir }}"
    - "{{ vk_log_dir }}"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vk_deploy_dir }}/docker-compose.yml"
    mode: "0640"
  notify: Restart VaultKeeper

- name: Template environment file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ vk_deploy_dir }}/.env"
    mode: "0600"
  notify: Restart VaultKeeper

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ vk_deploy_dir }}/Caddyfile"
    mode: "0640"
  notify: Restart VaultKeeper

- name: Pull Docker images
  community.docker.docker_compose_v2:
    project_src: "{{ vk_deploy_dir }}"
    pull: always
    state: present

- name: Start VaultKeeper services
  community.docker.docker_compose_v2:
    project_src: "{{ vk_deploy_dir }}"
    state: present

handlers:
  - name: Restart VaultKeeper
    community.docker.docker_compose_v2:
      project_src: "{{ vk_deploy_dir }}"
      state: restarted
