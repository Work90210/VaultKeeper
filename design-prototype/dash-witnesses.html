<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Witnesses — VaultKeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=11"><link rel="stylesheet" href="assets/dash.css?v=5">
<style>
.vk-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(20,17,12,.5);align-items:center;justify-content:center}
.vk-modal.open{display:flex}
.vk-modal-box{background:var(--paper);border-radius:var(--radius);max-width:600px;width:100%;padding:32px;box-shadow:var(--shadow-lg);margin:20px;max-height:85vh;overflow-y:auto}
.vk-modal-box h3{font-family:Fraunces,serif;font-size:22px;margin-bottom:6px}
.vk-modal-box h3 em{color:var(--accent);font-style:italic}
.vk-modal-box .msub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.vk-modal-box .mfield{margin-bottom:14px}
.vk-modal-box .mfield label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
.vk-modal-box .mfield label small{font-weight:400;color:var(--muted);margin-left:4px}
.vk-modal-box .mfield input,.vk-modal-box .mfield textarea,.vk-modal-box .mfield select{width:100%;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--radius-sm);font:inherit;font-size:13px;outline:none;background:var(--paper);box-sizing:border-box}
.vk-modal-box .mfield textarea{resize:vertical;min-height:72px}
.vk-modal-box .mgrid{display:grid;gap:14px}
.vk-modal-box .mgrid-2{grid-template-columns:1fr 1fr}
.vk-modal-box .mgrid-3{grid-template-columns:1fr 1fr 1fr}
.vk-modal-box .mactions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.vk-modal-box .mphase{font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);padding:2px 7px;border-radius:4px;background:rgba(184,66,28,.06);border:1px solid rgba(184,66,28,.12);margin-left:8px}
</style>
</head><body>
<script>function openModal(id){document.getElementById(id).classList.add("open")}function closeModal(id){document.getElementById(id).classList.remove("open")}</script>
<div class="dash" id="d-shell"></div>
<script src="assets/vk-shell-v2.js?v=8"></script>
<script>
renderDashShell('witnesses', `<a href="dash.html">Workspace</a><span class="sep">/</span><a href="dash-case.html">ICC-UKR-2024</a><span class="sep">/</span><span class="here">Witnesses</span>`);

const ws = [
  {id:"W-0144", ps:"Pseudonymised", risk:"high", sig:"signed", age:"14 d", ex:"4 exhibits", score:"0.82", vm:"voice-masked", src:"field intake"},
  {id:"W-0143", ps:"Pseudonymised", risk:"high", sig:"signed", age:"14 d", ex:"2 exhibits", score:"0.71", vm:"voice-masked", src:"field intake"},
  {id:"W-0142", ps:"Pseudonymised", risk:"medium", sig:"signed", age:"16 d", ex:"1 exhibit", score:"0.60", vm:"—", src:"remote · encrypted"},
  {id:"W-0141", ps:"Cleared name", risk:"low", sig:"signed", age:"18 d", ex:"6 exhibits", score:"0.88", vm:"—", src:"sworn deposition"},
  {id:"W-0140", ps:"Pseudonymised", risk:"extreme", sig:"duress-armed", age:"21 d", ex:"3 exhibits", score:"0.76", vm:"voice-masked", src:"protected channel"},
  {id:"W-0139", ps:"Pseudonymised", risk:"high", sig:"signed", age:"22 d", ex:"1 exhibit", score:"0.54", vm:"voice-masked", src:"intermediary"},
  {id:"W-0138", ps:"Cleared name", risk:"medium", sig:"signed", age:"24 d", ex:"2 exhibits", score:"0.80", vm:"—", src:"field intake"},
  {id:"W-0137", ps:"Pseudonymised", risk:"high", sig:"signed", age:"25 d", ex:"5 exhibits", score:"0.91", vm:"voice-masked", src:"protected channel"}
];
const rm = {low:'pl sealed',medium:'pl disc',high:'pl hold',extreme:'pl broken'};

document.getElementById('d-content').innerHTML = `
  <section class="d-pagehead">
    <div>
      <span class="eyebrow-m">Case · ICC-UKR-2024 · Berkeley Protocol Phase 3 · witness-sensitive</span>
      <h1>Witness <em>register</em></h1>
      <p class="sub">Every record is sealed with AES-256-GCM application-level encryption. Defence counsel see pseudonyms only; the mapping lives in a separate vault sealed by a two-of-three key ceremony. Break-the-glass unsealing is itself a sealed event.</p>
    </div>
    <div class="actions">
      <a class="btn ghost" href="#">Ceremony log</a>
      <a class="btn" href="#" onclick="event.preventDefault();openModal('modal-witness')">Add witness <span class="arr">→</span></a>
    </div>
  </section>

  <div class="d-kpis" style="margin-bottom:22px">
    <div class="d-kpi"><div class="k">Total protected</div><div class="v">218</div><div class="sub">198 pseudonymised · 20 cleared</div></div>
    <div class="d-kpi"><div class="k">Duress armed</div><div class="v">42</div><div class="sub">decoy vault ready</div></div>
    <div class="d-kpi"><div class="k">Voice-masked</div><div class="v">164</div><div class="sub">real-time DSP pipeline</div></div>
    <div class="d-kpi"><div class="k">Break-the-glass · 90 d</div><div class="v">2</div><div class="delta n">● both countersigned</div></div>
  </div>

  <div class="panel">
    <div class="fbar">
      <div class="fsearch"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--muted)"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg><input placeholder="pseudonym, linked exhibit, intermediary…"/></div>
      <span class="chip active">All <span class="x">·218</span></span>
      <span class="chip">High-risk <span class="chev">41</span></span>
      <span class="chip">Duress-armed <span class="chev">42</span></span>
      <span class="chip">Voice-masked <span class="chev">164</span></span>
      <span class="chip">Intermediary · any <span class="chev">▾</span></span>
    </div>
    <table class="tbl">
      <thead><tr><th>Pseudonym</th><th>Risk</th><th>Intake</th><th>Exhibits</th><th>Corrob. score</th><th>Voice</th><th>Signature</th><th>Age</th><th></th></tr></thead>
      <tbody>
        ${ws.map(w=>`
          <tr>
            <td><div class="ref">${w.id}<small>${w.ps}</small></div></td>
            <td><span class="${rm[w.risk]}">${w.risk}</span></td>
            <td style="font-size:13px;color:var(--muted)">${w.src}</td>
            <td class="num">${w.ex}</td>
            <td><span class="tag ${parseFloat(w.score)>=0.8?'a':''}">${w.score}</span></td>
            <td><span class="tag">${w.vm}</span></td>
            <td><span class="pl ${w.sig==='duress-armed'?'broken':'sealed'}">${w.sig}</span></td>
            <td class="mono">${w.age}</td>
            <td class="actions"><a class="linkarrow" href="#">Open →</a></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>

  <div class="g2" style="margin-top:22px">
    <div class="panel"><div class="panel-h"><h3>Duress & break-the-glass</h3><span class="meta">last 30 events</span></div><div class="panel-body"><div class="tl-list">
      <div class="tl-item accent"><div><div class="what"><em>Juliane</em> unsealed <strong>W-0140</strong> real-name for notary transmission</div><div class="who-line">countersigned by H. Morel · reason: cross-border warrant</div></div><div class="sig">2 d</div></div>
      <div class="tl-item"><div><div class="what">Decoy vault opened for <strong>W-0137</strong> — phishing probe detected</div><div class="who-line">origin: <code>45.61.x.x</code> · auto-blocked</div></div><div class="sig">6 d</div></div>
      <div class="tl-item"><div><div class="what">Ceremony: key rotation · <strong>2-of-3 quorum</strong> reached</div><div class="who-line">Morel · Nyoka · Hämmerli</div></div><div class="sig">11 d</div></div>
      <div class="tl-item"><div><div class="what"><em>Amir H.</em> re-pseudonymised <strong>W-0139</strong> on legal officer request</div><div class="who-line">mapping re-sealed · 3 exhibits re-linked</div></div><div class="sig">14 d</div></div>
    </div></div></div>

    <div class="panel"><div class="panel-h"><h3>Protection posture</h3><span class="meta">posture v3</span></div><div class="panel-body">
      <dl class="kvs">
        <dt>Mapping vault</dt><dd>Sealed by <strong>2-of-3</strong> quorum (Morel / Nyoka / Hämmerli). Rotates every 90 days.</dd>
        <dt>Default intake</dt><dd>Pseudonym auto-assigned at first save. Real name never reaches disk without quorum.</dd>
        <dt>Geo-fuzzing</dt><dd>50 km default radius on mentioned locations; tunable per-witness.</dd>
        <dt>Duress passphrase</dt><dd>Opens a decoy vault containing fabricated statements. Event sealed.</dd>
        <dt>Voice masking</dt><dd>Real-time DSP pitch-shift + formant flatten on all pseudonymised recordings.</dd>
        <dt>Defence access</dt><dd>Pseudonymised view only. Real-name requests require judicial order + ceremony.</dd>
      </dl>
    </div></div>
  </div>
`;
</script>
<div class="vk-modal" id="modal-witness" onclick="if(event.target===this)closeModal('modal-witness')">
<div class="vk-modal-box">
  <h3>Add <em>witness</em> <span class="mphase">Phase 3</span></h3>
  <p class="msub">Register a new witness. PII is encrypted with AES-256-GCM at the application layer. A pseudonym is generated automatically; the mapping is stored in a separate vault.</p>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Real name <small>encrypted at rest</small></label><input type="text" placeholder="Full legal name" /></div>
    <div class="mfield"><label>Pseudonym <small>auto-generated</small></label><input type="text" value="W-0145" disabled style="background:var(--bg-2);color:var(--muted)" /></div>
  </div>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Risk level</label>
    <select><option>Low</option><option>Medium</option><option selected>High</option><option>Extreme</option></select></div>
    <div class="mfield"><label>Source method</label>
    <select><option>Field intake</option><option>Remote · encrypted</option><option>Sworn deposition</option><option>Protected channel</option><option>Intermediary</option></select></div>
  </div>
  <div class="mfield"><label>Contact method <small>encrypted</small></label><input type="text" placeholder="Secure channel details..." /></div>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Voice masking</label>
    <select><option>None</option><option selected>Voice-masked</option></select></div>
    <div class="mfield"><label>Location <small>optional, encrypted</small></label><input type="text" placeholder="General area only" /></div>
  </div>
  <div class="mfield"><label>Linked exhibits</label><input type="text" placeholder="e.g. E-0918, E-0912" /></div>
  <div class="mfield"><label>Notes <small>encrypted</small></label><textarea placeholder="Initial intake notes, safety concerns..."></textarea></div>
  <div class="mactions">
    <button class="btn ghost sm" onclick="closeModal('modal-witness')">Cancel</button>
    <button class="btn sm" onclick="alert('Witness registered & encrypted (demo)');closeModal('modal-witness')">Register & encrypt</button>
  </div>
</div></div>
</body></html>
