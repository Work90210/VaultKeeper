<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analysis notes — VaultKeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=11"><link rel="stylesheet" href="assets/dash.css?v=5">
<style>
.vk-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(20,17,12,.5);align-items:center;justify-content:center}
.vk-modal.open{display:flex}
.vk-modal-box{background:var(--paper);border-radius:var(--radius);max-width:600px;width:100%;padding:32px;box-shadow:var(--shadow-lg);margin:20px;max-height:85vh;overflow-y:auto}
.vk-modal-box h3{font-family:Fraunces,serif;font-size:22px;margin-bottom:6px}
.vk-modal-box h3 em{color:var(--accent);font-style:italic}
.vk-modal-box .msub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.vk-modal-box .mfield{margin-bottom:14px}
.vk-modal-box .mfield label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
.vk-modal-box .mfield label small{font-weight:400;color:var(--muted);margin-left:4px}
.vk-modal-box .mfield input,.vk-modal-box .mfield textarea,.vk-modal-box .mfield select{width:100%;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--radius-sm);font:inherit;font-size:13px;outline:none;background:var(--paper);box-sizing:border-box}
.vk-modal-box .mfield textarea{resize:vertical;min-height:72px}
.vk-modal-box .mgrid{display:grid;gap:14px}
.vk-modal-box .mgrid-2{grid-template-columns:1fr 1fr}
.vk-modal-box .mgrid-3{grid-template-columns:1fr 1fr 1fr}
.vk-modal-box .mactions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.vk-modal-box .mphase{font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);padding:2px 7px;border-radius:4px;background:rgba(184,66,28,.06);border:1px solid rgba(184,66,28,.12);margin-left:8px}
</style>
</head><body>
<script>function openModal(id){document.getElementById(id).classList.add("open")}function closeModal(id){document.getElementById(id).classList.remove("open")}</script>
<div class="dash" id="d-shell"></div>
<script src="assets/vk-shell-v2.js?v=8"></script>
<script>
renderDashShell('analysis', `<a href="dash.html">Workspace</a><span class="sep">/</span><a href="dash-case.html">ICC-UKR-2024</a><span class="sep">/</span><span class="here">Analysis notes</span>`);

const notes = [
  {ref:"NOTE-184", t:"Command structure — Unit 28B, April 2024", who:"H. Morel", c:"a", tags:["hypothesis","cmd-structure"], links:"14 exhibits · 3 witnesses", ago:"2 d", st:"peer-review", ex:"Working hypothesis is that S-038 reported through M-112, not directly to regional command. See cross-reference with intercept E-0916 at 14:03 EET…"},
  {ref:"NOTE-183", t:"Timeline reconciliation — 19 Apr checkpoint events", who:"Amir H.", c:"c", tags:["timeline","corroborated"], links:"9 exhibits · 4 witnesses", ago:"3 d", st:"signed", ex:"Revised W-0144 intake time from 17:40 to 17:52 after drone pass confirmation at 17:54. Now consistent with W-0139 and body-cam BC-17 excerpt…"},
  {ref:"NOTE-182", t:"Unverified — alleged second convoy", who:"Martyna K.", c:"b", tags:["uncorroborated","open"], links:"2 exhibits · 1 witness", ago:"5 d", st:"draft", ex:"Single source currently (W-0139). Flagging as uncorroborated pending independent confirmation. Intercept E-0916 mentions 'second formation' but ambiguous…"},
  {ref:"NOTE-181", t:"Financial trail — Raiffeisen ledger anomalies", who:"W. Nyoka", c:"e", tags:["financial","in-progress"], links:"1 exhibit", ago:"7 d", st:"draft", ex:"Three transfers on ledger E-0914 show identical round amounts to intermediary accounts within 72h of checkpoint incident. Requesting OLAF review…"},
  {ref:"NOTE-180", t:"Counter-evidence — defence exculpatory claim", who:"H. Morel", c:"a", tags:["defence","rule-77"], links:"3 exhibits", ago:"9 d", st:"signed", ex:"Defence filed motion asserting S-038 was off-duty on 19 Apr. Our drone footage E-0918 contradicts this at 17:54. Nonetheless, per Rule 77, preserving and disclosing…"},
  {ref:"NOTE-179", t:"OSINT cross-check · Bellingcat satellite trace", who:"Amir H.", c:"c", tags:["osint","peer"], links:"4 exhibits", ago:"11 d", st:"peer-review", ex:"Sentinel-2 pass on 18 Apr 09:12Z confirms vehicle concentration at coordinates consistent with W-0144 account. Bellingcat read-only peer has independently noted…"}
];
const sp={signed:'sealed','peer-review':'disc',draft:'draft'};

document.getElementById('d-content').innerHTML = `
  <section class="d-pagehead">
    <div>
      <span class="eyebrow-m">Case · ICC-UKR-2024 · Berkeley Protocol Phase 6</span>
      <h1>Analysis <em>notes</em></h1>
      <p class="sub">Phase 6 of the Berkeley Protocol requires documented analytical reasoning with iterative refinement. Every note is a CRDT document tied to the exhibits it cites. Hypotheses, dead-ends, counter-evidence — all sealed into the chain so defence counsel sees the reasoning, not just the conclusion.</p>
    </div>
    <div class="actions">
      <a class="btn ghost" href="#">Templates</a>
      <a class="btn" href="#" onclick="event.preventDefault();openModal('modal-note')">New note <span class="arr">→</span></a>
    </div>
  </section>

  <div class="d-kpis" style="margin-bottom:22px">
    <div class="d-kpi"><div class="k">Notes · this case</div><div class="v">184</div><div class="sub">62 signed · 38 peer-review · 84 draft</div></div>
    <div class="d-kpi"><div class="k">Uncorroborated · open</div><div class="v">11</div><div class="delta n">● flagged to prosecution</div></div>
    <div class="d-kpi"><div class="k">Counter-evidence · preserved</div><div class="v">7</div><div class="sub">per Rule 77 disclosure</div></div>
    <div class="d-kpi"><div class="k">Avg. citations</div><div class="v">6.2</div><div class="sub">exhibits per note</div></div>
  </div>

  <div class="panel">
    <div class="fbar">
      <div class="fsearch"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--muted)"><circle cx="7" cy="7" r="4"/><path d="M10 10l3 3"/></svg><input placeholder="reference, tag, author, linked exhibit…"/></div>
      <span class="chip active">All 184</span>
      <span class="chip">Signed 62</span>
      <span class="chip">Peer-review 38</span>
      <span class="chip">Draft 84</span>
      <span class="chip">Hypothesis ▾</span>
      <span class="chip">Author ▾</span>
    </div>
    <div class="panel-body" style="padding:0">
      ${notes.map(n=>`
        <div style="padding:22px 28px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 220px;gap:32px;align-items:start">
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span class="ref" style="display:block"><strong>${n.ref}</strong></span><span class="pl ${sp[n.st]}">${n.st}</span>${n.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <a href="#" style="font-family:'Fraunces',serif;font-size:22px;letter-spacing:-.015em;color:var(--ink);line-height:1.2;display:block">${n.t}</a>
            <p style="color:var(--muted);font-size:13.5px;line-height:1.6;margin-top:8px;max-width:68ch">${n.ex}</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-end;font-size:12.5px;color:var(--muted);text-align:right">
            <div style="display:flex;align-items:center;gap:8px"><span class="avs"><span class="av ${n.c}">${n.who[0]}</span></span><span style="font-family:'Fraunces',serif;font-size:14px;color:var(--ink);letter-spacing:-.005em">${n.who}</span></div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase">${n.links}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px">${n.ago} ago</div>
            <a class="linkarrow" href="#" style="font-size:12.5px">Open →</a>
          </div>
        </div>
      `).join('')}
    </div>
  </div>
`;
</script>
<div class="vk-modal" id="modal-note" onclick="if(event.target===this)closeModal('modal-note')">
<div class="vk-modal-box">
  <h3>New analysis <em>note</em> <span class="mphase">Phase 6</span></h3>
  <p class="msub">Document your analytical reasoning. Phase 6 requires that analysis is transparent — hypotheses, dead-ends, and counter-evidence are all part of the record.</p>
  <div class="mfield"><label>Title <small>required</small></label><input type="text" placeholder="e.g. Timeline reconciliation — checkpoint events, 19 Apr 2026" /></div>
  <div class="mfield"><label>Analysis type</label>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="chip active" style="cursor:pointer" onclick="this.classList.toggle('active')">Hypothesis</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">Timeline</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">Command structure</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">Financial</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">Geospatial</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">Counter-evidence</span>
    <span class="chip" style="cursor:pointer" onclick="this.classList.toggle('active')">OSINT cross-check</span>
  </div></div>
  <div class="mfield"><label>Assigned to</label>
    <select><option value="">Select team member...</option><option>H. Morel — Lead Investigator</option><option>Amir Haddad — Evidence Technician</option><option>Martyna Kovacs — Redaction Analyst</option><option>Juliane Wirth — Witness Liaison</option><option>W. Nyoka — External Liaison</option></select></div>
  <div class="mfield"><label>Methodology</label><textarea placeholder="Describe your analytical approach..."></textarea></div>
  <div class="mfield"><label>Content <small>required</small></label><textarea style="min-height:120px" placeholder="Write your analysis..."></textarea></div>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Referenced exhibits</label><input type="text" placeholder="e.g. E-0918, E-0916, E-0911" /></div>
    <div class="mfield"><label>Referenced witnesses</label><input type="text" placeholder="e.g. W-0144, W-0099" /></div>
  </div>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Related inquiry entries</label><input type="text" placeholder="e.g. INQ-042, INQ-039" /></div>
    <div class="mfield"><label>Supersedes</label><input type="text" placeholder="e.g. NOTE-182 (if revising)" /></div>
  </div>
  <div class="mfield"><label>Limitations & caveats</label><textarea placeholder="What are the limits of this analysis?"></textarea></div>
  <div class="mactions">
    <button class="btn ghost sm" onclick="closeModal('modal-note')">Cancel</button>
    <button class="btn ghost sm" onclick="alert('Saved as draft (demo)');closeModal('modal-note')">Save draft</button>
    <button class="btn sm" onclick="alert('Note signed & sealed (demo)');closeModal('modal-note')">Sign & seal note</button>
  </div>
</div></div>
</body></html>
