<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Corroborations — VaultKeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=11"><link rel="stylesheet" href="assets/dash.css?v=5">
<style>
.vk-modal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(20,17,12,.5);align-items:center;justify-content:center}
.vk-modal.open{display:flex}
.vk-modal-box{background:var(--paper);border-radius:var(--radius);max-width:600px;width:100%;padding:32px;box-shadow:var(--shadow-lg);margin:20px;max-height:85vh;overflow-y:auto}
.vk-modal-box h3{font-family:Fraunces,serif;font-size:22px;margin-bottom:6px}
.vk-modal-box h3 em{color:var(--accent);font-style:italic}
.vk-modal-box .msub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.vk-modal-box .mfield{margin-bottom:14px}
.vk-modal-box .mfield label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
.vk-modal-box .mfield label small{font-weight:400;color:var(--muted);margin-left:4px}
.vk-modal-box .mfield input,.vk-modal-box .mfield textarea,.vk-modal-box .mfield select{width:100%;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--radius-sm);font:inherit;font-size:13px;outline:none;background:var(--paper);box-sizing:border-box}
.vk-modal-box .mfield textarea{resize:vertical;min-height:72px}
.vk-modal-box .mgrid{display:grid;gap:14px}
.vk-modal-box .mgrid-2{grid-template-columns:1fr 1fr}
.vk-modal-box .mgrid-3{grid-template-columns:1fr 1fr 1fr}
.vk-modal-box .mactions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.vk-modal-box .mphase{font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);padding:2px 7px;border-radius:4px;background:rgba(184,66,28,.06);border:1px solid rgba(184,66,28,.12);margin-left:8px}
</style>
</head><body>
<script>function openModal(id){document.getElementById(id).classList.add("open")}function closeModal(id){document.getElementById(id).classList.remove("open")}</script>
<div class="dash" id="d-shell"></div>
<script src="assets/vk-shell-v2.js?v=8"></script>
<script>
renderDashShell('corrob', `<a href="dash.html">Workspace</a><span class="sep">/</span><a href="dash-case.html">ICC-UKR-2024</a><span class="sep">/</span><span class="here">Corroborations</span>`);

const claims = [
  {ref:"C-0412", t:"S-038 gave checkpoint order at 17:52, 19 Apr 2026", sc:0.91, st:"corroborated", s:[{k:"witness",n:"W-0144 statement"},{k:"video",n:"E-0918 drone 03:18"},{k:"audio",n:"E-0916 intercept 14:03"},{k:"osint",n:"Sentinel-2 18 Apr"}]},
  {ref:"C-0411", t:"Second convoy movement through Andriivka region", sc:0.46, st:"weak", s:[{k:"witness",n:"W-0139 only"}]},
  {ref:"C-0410", t:"Unit 28B referenced in direct command chain", sc:0.78, st:"corroborated", s:[{k:"audio",n:"E-0916 intercept"},{k:"doc",n:"E-0917 intake p.4"},{k:"doc",n:"E-0914 ledger notation"}]},
  {ref:"C-0409", t:"Body-cam BC-17 excerpt matches W-0144 account", sc:0.87, st:"corroborated", s:[{k:"video",n:"E-0910 body-cam"},{k:"witness",n:"W-0144 statement"},{k:"video",n:"E-0918 drone"}]},
  {ref:"C-0408", t:"Financial transfers coincide with incident window", sc:0.62, st:"investigating", s:[{k:"doc",n:"E-0914 Raiffeisen"},{k:"note",n:"NOTE-181"}]},
  {ref:"C-0407", t:"Plate BX-4281 matches administrative-building records", sc:0.69, st:"investigating", s:[{k:"img",n:"E-0907 plate"},{k:"osint",n:"external reg"}]},
  {ref:"C-0406", t:"Defence exculpatory: S-038 off-duty on 19 Apr", sc:0.18, st:"refuted", s:[{k:"video",n:"E-0918 drone 17:54"},{k:"witness",n:"W-0141 deposition"}]}
];
const sp={corroborated:'sealed',weak:'disc',investigating:'hold',refuted:'broken'};
const kC={witness:'c',video:'a',audio:'b',doc:'d',osint:'e',img:'e',note:'a'};

document.getElementById('d-content').innerHTML = `
  <section class="d-pagehead">
    <div>
      <span class="eyebrow-m">Case · ICC-UKR-2024 · Berkeley Protocol Phase 5</span>
      <h1>Multi-source <em>corroboration</em></h1>
      <p class="sub">Phase 5 of the Berkeley Protocol requires source authentication, content verification, and multi-source corroboration. Every factual claim carries a score computed from independent sources, each weighted by evidence kind and custody strength. Single-source claims are shown, never hidden — that's the point.</p>
    </div>
    <div class="actions">
      <a class="btn ghost" href="#">Matrix view</a>
      <a class="btn" href="#" onclick="event.preventDefault();openModal('modal-claim')">New claim <span class="arr">→</span></a>
    </div>
  </section>

  <div class="d-kpis" style="margin-bottom:22px">
    <div class="d-kpi"><div class="k">Claims tracked</div><div class="v">62</div><div class="sub">41 corroborated · 14 investigating · 7 refuted</div></div>
    <div class="d-kpi"><div class="k">Median score</div><div class="v">0.74</div><div class="sub">across corroborated</div></div>
    <div class="d-kpi"><div class="k">Single-source · flagged</div><div class="v">9</div><div class="delta n">● preserved & disclosed</div></div>
    <div class="d-kpi"><div class="k">Cross-case links</div><div class="v">23</div><div class="sub">to CIJA Berlin sub-chain</div></div>
  </div>

  <div class="panel">
    <div class="panel-h"><h3>Claims</h3><span class="meta">sorted by score</span></div>
    <div class="panel-body" style="padding:0">
      ${claims.map(c=>`
        <div style="padding:20px 28px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:90px 1fr 220px 140px;gap:28px;align-items:center">
          <div style="text-align:center">
            <div style="font-family:'Fraunces',serif;font-size:36px;letter-spacing:-.03em;color:${c.sc>=0.75?'var(--ok)':c.sc>=0.5?'var(--accent)':'var(--muted)'};line-height:1">${c.sc.toFixed(2)}</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:4px">score</div>
          </div>
          <div>
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span class="ref" style="display:block"><strong>${c.ref}</strong></span><span class="pl ${sp[c.st]}">${c.st}</span></div>
            <div style="font-family:'Fraunces',serif;font-size:18px;letter-spacing:-.01em;line-height:1.3">${c.t}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:5px">
            <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px">sources · ${c.s.length}</div>
            ${c.s.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px"><span class="av ${kC[s.k]}" style="width:20px;height:20px;font-size:9px;border-width:1px">${s.k[0].toUpperCase()}</span><span style="color:var(--ink-2)">${s.n}</span></div>`).join('')}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div style="width:100%;height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${c.sc*100}%;background:${c.sc>=0.75?'var(--ok)':c.sc>=0.5?'var(--accent)':'#b35c5c'}"></div></div>
            <a class="linkarrow" href="#" style="font-size:12.5px">Open claim →</a>
          </div>
        </div>
      `).join('')}
    </div>
  </div>
`;
</script>
<div class="vk-modal" id="modal-claim" onclick="if(event.target===this)closeModal('modal-claim')">
<div class="vk-modal-box">
  <h3>New corroboration <em>claim</em> <span class="mphase">Phase 5</span></h3>
  <p class="msub">Define a factual claim and link independent sources. The Berkeley Protocol requires multi-source corroboration — minimum 2 independent items per claim.</p>
  <div class="mfield"><label>Factual claim <small>required</small></label><textarea placeholder="State the factual claim to be corroborated, e.g. 'S-038 gave checkpoint order at 17:52, 19 Apr 2026'"></textarea></div>
  <div class="mfield"><label>Primary evidence <small>required</small></label><input type="text" placeholder="e.g. E-0918" /></div>
  <div class="mfield"><label>Supporting evidence <small>minimum 1 additional</small></label><input type="text" placeholder="e.g. W-0144, E-0916, E-0911" /></div>
  <div class="mfield"><label>Contradicting evidence <small>if any — preserved per Rule 77</small></label><input type="text" placeholder="e.g. defence exhibit D-004" /></div>
  <div class="mgrid mgrid-2">
    <div class="mfield"><label>Initial score estimate</label><input type="number" min="0" max="1" step="0.01" placeholder="0.00 – 1.00" /></div>
    <div class="mfield"><label>Status</label>
    <select><option>Investigating</option><option>Corroborated</option><option>Weak</option><option>Refuted</option></select></div>
  </div>
  <div class="mfield"><label>Assigned to</label>
    <select><option value="">Select team member...</option><option>H. Morel — Lead Investigator</option><option>Amir Haddad — Evidence Technician</option><option>Martyna Kovacs — Redaction Analyst</option><option>Juliane Wirth — Witness Liaison</option><option>W. Nyoka — External Liaison</option></select></div>
  <div class="mfield"><label>Notes</label><textarea placeholder="Context for the claim, methodology for scoring..."></textarea></div>
  <div class="mactions">
    <button class="btn ghost sm" onclick="closeModal('modal-claim')">Cancel</button>
    <button class="btn sm" onclick="alert('Claim created (demo)');closeModal('modal-claim')">Create claim</button>
  </div>
</div></div>
</body></html>
