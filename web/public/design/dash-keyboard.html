<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Keyboard — VaultKeeper</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css?v=11"><link rel="stylesheet" href="assets/dash.css?v=5">
<style>
kbd{display:inline-grid;place-items:center;min-width:22px;height:22px;padding:0 6px;border-radius:5px;background:var(--paper);border:1px solid var(--line-2);box-shadow:0 1px 0 rgba(20,17,12,.06);font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--ink);letter-spacing:0}
.kb-group{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--paper)}
@media (max-width:820px){.kb-group{grid-template-columns:1fr}}
.kb-col{padding:24px 26px;border-right:1px solid var(--line)}
.kb-col:last-child{border-right:none}
@media (max-width:820px){.kb-col{border-right:none;border-bottom:1px solid var(--line)}.kb-col:last-child{border-bottom:none}}
.kb-col h4{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.kb-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.kb-row:last-child{border-bottom:none}
.kb-row .l{font-size:13.5px;color:var(--ink-2)}
.kb-row .l small{display:block;font-size:11.5px;color:var(--muted);margin-top:1px}
.kb-keys{display:flex;gap:4px;align-items:center}
.kb-keys .sep{font-size:10px;color:var(--muted);padding:0 2px}

/* Command palette */
.pal{max-width:640px;margin:0 auto;background:var(--paper);border:1px solid var(--line-2);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden}
.pal .top{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.pal .top svg{color:var(--muted)}
.pal .top input{flex:1;border:none;outline:none;background:none;font:inherit;font-family:"Fraunces",serif;font-size:22px;letter-spacing:-.01em;color:var(--ink)}
.pal .top .hk{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:.04em}
.pal .sec{padding:6px 20px 4px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;background:var(--bg-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-top:0}
.pal .item{display:grid;grid-template-columns:22px 1fr auto;gap:14px;align-items:center;padding:12px 20px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--line)}
.pal .item:last-child{border-bottom:none}
.pal .item:hover,.pal .item.sel{background:var(--bg-2)}
.pal .item.sel{background:var(--ink);color:var(--bg)}
.pal .item.sel .k,.pal .item.sel .sub{color:var(--muted-2)}
.pal .item.sel kbd{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.16);color:var(--bg)}
.pal .item .ic{width:22px;height:22px;border-radius:5px;background:var(--bg-2);display:grid;place-items:center;font-family:"Fraunces",serif;font-size:13px;color:var(--accent)}
.pal .item.sel .ic{background:rgba(228,164,135,.2);color:var(--accent-soft)}
.pal .item .t{line-height:1.2;font-family:"Fraunces",serif;font-size:15px;letter-spacing:-.005em}
.pal .item .sub{display:block;font-size:11.5px;color:var(--muted);font-family:"Inter",sans-serif;margin-top:2px}
.pal .foot{padding:10px 20px;display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:.04em;background:var(--bg-2);border-top:1px solid var(--line)}

/* Cheatsheet overlay */
.cheat-stage{position:relative;background:rgba(20,17,12,.55);border-radius:var(--radius);overflow:hidden;padding:40px;backdrop-filter:blur(2px)}
.cheat{background:var(--paper);border:1px solid var(--line-2);border-radius:16px;box-shadow:var(--shadow-lg);overflow:hidden}
.cheat-h{padding:18px 22px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;border-bottom:1px solid var(--line)}
.cheat-h .ic{width:28px;height:28px;border-radius:8px;background:var(--ink);color:var(--bg);display:grid;place-items:center;font-family:"Fraunces",serif;font-size:14px}
.cheat-h .t{font-family:"Fraunces",serif;font-size:20px;letter-spacing:-.01em}
.cheat-h .t em{color:var(--accent);font-style:italic}
.cheat-h .close{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.04em}
</style>
</head><body>
<div class="dash" id="d-shell"></div>
<script src="assets/vk-shell-v2.js"></script>
<script>
renderDashShell('overview', `<a href="dash.html">Workspace</a><span class="sep">/</span><span class="here">Keyboard · ⌘K</span>`);

document.getElementById('d-content').innerHTML = `

        <input value="sea"/>

      </div>

      <div class="sec">Actions · on this case</div>
      <div class="item"><span class="ic">↑</span><div><span class="t">Seal new exhibit…</span><span class="sub">client-side hash + timestamp</span></div><span><kbd>N</kbd> <kbd>E</kbd></span></div>
      <div class="item"><span class="ic">¶</span><div><span class="t">Seal analysis note…</span><span class="sub">hypothesis / counter-evidence</span></div><span><kbd>N</kbd> <kbd>N</kbd></span></div>
      <div class="item"><span class="ic">◉</span><div><span class="t">Add witness (pseudonymous)…</span><span class="sub">triggers mapping-vault unseal</span></div><span><kbd>N</kbd> <kbd>W</kbd></span></div>

        <h4>Navigation · go to</h4>

        <div class="kb-row"><div class="l">Cases</div><span class="kb-keys"><kbd>G</kbd><kbd>C</kbd></span></div>

      <div class="kb-col">
        <h4>Navigation · within a case</h4>

        <div class="kb-row"><div class="l">Previous / next exhibit</div><span class="kb-keys"><kbd>J</kbd><span class="sep">·</span><kbd>K</kbd></span></div>
        <div class="kb-row"><div class="l">Back to case</div><span class="kb-keys"><kbd>⌘</kbd><kbd>↑</kbd></span></div>

    <div class="kb-group">

        <h4>Actions · seal events</h4>

        <div class="kb-row"><div class="l">Request countersign from…</div><span class="kb-keys"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>R</kbd></span></div>
      </div>
      <div class="kb-col">
        <h4>Redaction editor</h4>

        <div class="kb-row"><div class="l">Geo-fuzz selection</div><span class="kb-keys"><kbd>⌘</kbd><kbd>G</kbd></span></div>

        <div class="kb-row"><div class="l">Revert mark under cursor</div><span class="kb-keys"><kbd>⌘</kbd><kbd>Z</kbd></span></div>

    </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:32px">
    <div class="kb-group">

        <div class="kb-row"><div class="l">Select row / card</div><span class="kb-keys"><kbd>X</kbd></span></div>
