<div class="dash" id="d-shell"></div>

<script>
renderDashShell('federation', `<a href="dash.html">Workspace</a><span class="sep">/</span><span class="here">Federation</span>`);

const peers=[
  {n:"CIJA Berlin",r:"sub-chain ·/CIJA",cases:4,last:"2 min",st:"healthy",lag:"0.4 s",keys:"Ed25519 · rotated 14 d ago",ops:"12,418 ops · 94 MB",note:"Parallel investigation mirror"},
  {n:"KSC Pristina",r:"full peer",cases:2,last:"8 min",st:"healthy",lag:"1.1 s",keys:"Ed25519 · rotated 22 d ago",ops:"48,217 ops · 612 MB",note:"Full bidirectional mirror · Kosovo Specialist Chambers"},

document.getElementById('d-content').innerHTML = `

    </div>
    <div class="actions">
      <a class="btn ghost" href="#">Protocol spec</a>
      <a class="btn" href="#">Invite peer <span class="arr">→</span></a>
    </div>
  </section>

  <div class="d-kpis" style="margin-bottom:22px">
    <div class="d-kpi"><div class="k">Active peers</div><div class="v">5</div><div class="sub">3 healthy · 1 lagging · 1 paused</div></div>
    <div class="d-kpi"><div class="k">Federated cases</div><div class="v">6</div><div class="sub">of 38 total</div></div>
    <div class="d-kpi"><div class="k">Merge p95 · 24h</div><div class="v">1.4<em>s</em></div><div class="sub">roundtrip seal</div></div>

      ["14:14:11","KSC Pristina","out","4 ops · ICC-KOS-2024","c44d…47e2","b"],

        <span class="pl ${e[2]==='in'?'sealed':'disc'}" style="text-transform:uppercase">${e[2]==='in'?'← in':'out →'}</span>
        <span class="mono" style="font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:11.5px">${e[4]}</span>
      </div>
    `).join('')}
  </div></div>
`;
</script></body></html>
