name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          MAJOR_MINOR=${TAG%.*}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vaultkeeper/vaultkeeper:latest
            ghcr.io/vaultkeeper/vaultkeeper:${{ steps.version.outputs.tag }}
            ghcr.io/vaultkeeper/vaultkeeper:${{ steps.version.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  changelog:
    name: Changelog & Release
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {"title": "### Added", "labels": ["feat", "feature"]},
                {"title": "### Changed", "labels": ["refactor", "perf"]},
                {"title": "### Fixed", "labels": ["fix", "bugfix"]},
                {"title": "### Security", "labels": ["security"]},
                {"title": "### Documentation", "labels": ["docs"]}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: true
