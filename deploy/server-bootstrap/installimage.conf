## Hetzner installimage — VaultKeeper production
## Usage: run `installimage` in the Hetzner rescue system, then replace
## the auto-generated config with this one (paste into the editor).
##
## IMPORTANT: verify drive names in rescue with `lsblk` first.
## On most recent Hetzner dedicated boxes these are /dev/nvme0n1 and /dev/nvme1n1.
## For SATA/SAS drives use /dev/sda and /dev/sdb.

DRIVE1 /dev/nvme0n1
DRIVE2 /dev/nvme1n1

## Software RAID1 for redundancy (two-drive mirror)
SWRAID 1
SWRAIDLEVEL 1

BOOTLOADER grub
HOSTNAME vaultkeeper-prod

## Partitioning — LVM with a dedicated volume for Docker data
PART /boot ext4  1024M
PART lvm  vg0   all

LV vg0 root /              ext4  40G
LV vg0 swap swap           swap   8G
LV vg0 docker /var/lib/docker ext4  200G
LV vg0 data /srv/vaultkeeper ext4  all

## Debian 12 (bookworm) minimal base image
IMAGE /root/.oldroot/nfs/install/../images/Debian-1202-bookworm-amd64-base.tar.gz

## Inject your SSH public key at /tmp/authorized_keys before running installimage.
## (The runbook walks you through this.)
SSHKEYS_URL file:///tmp/authorized_keys
